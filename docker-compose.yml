version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    depends_on:
      - user-service
      - album-service
      - story-service
      - collaboration-service
      - export-service
    networks:
      - backend
    volumes:
      - ./logs:/app/logs

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=user-service
      - DATABASE_URL=postgresql://postgres:password@db:5432/storydb
      - REDIS_URL=redis://cache:6379
      - JWT_SECRET=your-super-secret-jwt-key
    depends_on:
      - db
      - cache
    networks:
      - backend
    volumes:
      - ./services/user-service:/app/services/user-service
      - ./shared:/app/shared

  album-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=album-service
      - DATABASE_URL=postgresql://postgres:password@db:5432/storydb
      - REDIS_URL=redis://cache:6379
    depends_on:
      - db
      - cache
    networks:
      - backend
    volumes:
      - ./services/album-service:/app/services/album-service
      - ./shared:/app/shared

  story-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=story-service
      - DATABASE_URL=postgresql://postgres:password@db:5432/storydb
      - REDIS_URL=redis://cache:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - db
      - cache
      - rabbitmq
    networks:
      - backend
    volumes:
      - ./services/story-service:/app/services/story-service
      - ./shared:/app/shared

  collaboration-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=collaboration-service
      - DATABASE_URL=postgresql://postgres:password@db:5432/storydb
      - REDIS_URL=redis://cache:6379
    depends_on:
      - db
      - cache
    networks:
      - backend
    volumes:
      - ./services/collaboration-service:/app/services/collaboration-service
      - ./shared:/app/shared

  export-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=export-service
      - DATABASE_URL=postgresql://postgres:password@db:5432/storydb
      - REDIS_URL=redis://cache:6379
      - S3_ENDPOINT=minio
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=exports
    depends_on:
      - db
      - cache
      - minio
    networks:
      - backend
    volumes:
      - ./services/export-service:/app/services/export-service
      - ./shared:/app/shared

  analysis-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=analysis-service
      - DATABASE_URL=postgresql://postgres:password@db:5432/storydb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - S3_ENDPOINT=minio
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=photos
    depends_on:
      - db
      - rabbitmq
      - minio
    networks:
      - backend
    volumes:
      - ./services/analysis-service:/app/services/analysis-service
      - ./shared:/app/shared
      - model-data:/app/models

  version-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=version-service
      - DATABASE_URL=postgresql://postgres:password@db:5432/storydb
    depends_on:
      - db
    networks:
      - backend
    volumes:
      - ./services/version-service:/app/services/version-service
      - ./shared:/app/shared

  db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=storydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  miniodata:
  model-data:
